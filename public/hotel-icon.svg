<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="hotelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="100" height="100" rx="20" fill="url(#hotelGradient)" />
  
  <!-- Edificio principal -->
  <rect x="25" y="35" width="50" height="50" rx="2" fill="white" opacity="0.95" />
  
  <!-- Ventanas -->
  <!-- Fila 1 -->
  <rect x="30" y="40" width="7" height="7" fill="#4F46E5" />
  <rect x="40" y="40" width="7" height="7" fill="#4F46E5" />
  <rect x="50" y="40" width="7" height="7" fill="#4F46E5" />
  <rect x="60" y="40" width="7" height="7" fill="#4F46E5" />
  
  <!-- Fila 2 -->
  <rect x="30" y="51" width="7" height="7" fill="#4F46E5" />
  <rect x="40" y="51" width="7" height="7" fill="#FFD700" />
  <rect x="50" y="51" width="7" height="7" fill="#4F46E5" />
  <rect x="60" y="51" width="7" height="7" fill="#4F46E5" />
  
  <!-- Fila 3 -->
  <rect x="30" y="62" width="7" height="7" fill="#4F46E5" />
  <rect x="40" y="62" width="7" height="7" fill="#4F46E5" />
  <rect x="50" y="62" width="7" height="7" fill="#4F46E5" />
  <rect x="60" y="62" width="7" height="7" fill="#4F46E5" />
  
  <!-- Puerta -->
  <rect x="43" y="74" width="14" height="11" rx="1" fill="#8B4513" />
  <circle cx="56" cy="79.5" r="1.5" fill="#FFD700" />
  
  <!-- Techo/coronamiento -->
  <polygon points="25,35 50,25 75,35" fill="#7C3AED" />
